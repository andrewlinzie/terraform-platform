name: Terraform Infra

on:
  pull_request:
    paths:
      - 'modules/**'
      - 'environments/**'
      - '.github/workflows/**'
      - 'backend/**'
  push:
    branches:
      - main
    paths:
      - 'modules/**'
      - 'environments/**'
      - '.github/workflows/**'
      - 'backend/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - shared
          - staging
          - prod
      action:
        description: 'Terraform action'
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
      dev: ${{ steps.filter.outputs.dev }}
      staging: ${{ steps.filter.outputs.staging }}
      prod: ${{ steps.filter.outputs.prod }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared:
              - 'modules/**'
              - 'backend/**'
              - '.github/workflows/**'
            dev:
              - 'environments/dev/**'
            staging:
              - 'environments/staging/**'
            prod:
              - 'environments/prod/**'
              
  set-context:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set.outputs.environment }}
      working_dir: ${{ steps.set.outputs.working_dir }}
    steps:
      - name: Set context
        id: set
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          else
            ENV="dev"
          fi

          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "working_dir=environments/$ENV" >> $GITHUB_OUTPUT

  fmt-validate:
    runs-on: ubuntu-latest
    needs: set-context
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.set-context.outputs.environment == 'prod' && secrets.AWS_ROLE_ARN_PROD || needs.set-context.outputs.environment == 'staging' && secrets.AWS_ROLE_ARN_STAGING || secrets.AWS_ROLE_ARN_DEV }}
          aws-region: us-east-2

      - name: Terraform Init
        working-directory: ${{ needs.set-context.outputs.working_dir }}
        run: terraform init -input=false -backend-config=../../backend/${{ needs.set-context.outputs.environment }}.hcl

      - run: terraform fmt -check -recursive

      - working-directory: ${{ needs.set-context.outputs.working_dir }}
        run: terraform validate

  plan:
    runs-on: ubuntu-latest
    needs: [set-context, fmt-validate]
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'push' ||
      (
        github.event_name == 'workflow_dispatch' &&
        (
          github.event.inputs.action == 'plan' ||
          github.event.inputs.action == 'apply'
        )
      )
    env:
      TF_VAR_trusted_cidr_blocks: ${{ secrets.TF_VAR_trusted_cidr_blocks }}
      TF_VAR_cms_public_key: ${{ secrets.TF_VAR_cms_public_key }}
      # Used only by environments/shared (Jenkins SSH key pair). Tier envs declare the variable with default "" so Terraform accepts the env var.
      TF_VAR_jenkins_public_key: ${{ secrets.TF_VAR_cms_public_key }}
      TF_VAR_jenkins_web_ingress_cidr_blocks: ${{ secrets.TF_VAR_jenkins_web_ingress_cidr_blocks }}
      TF_VAR_enable_cluster_admin_access_entry: ${{ vars.TF_VAR_enable_cluster_admin_access_entry }}
      TF_VAR_cluster_admin_principal_arn: ${{ vars.TF_VAR_cluster_admin_principal_arn }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.set-context.outputs.environment == 'prod' && secrets.AWS_ROLE_ARN_PROD || needs.set-context.outputs.environment == 'staging' && secrets.AWS_ROLE_ARN_STAGING || secrets.AWS_ROLE_ARN_DEV }}
          aws-region: us-east-2

      - name: Terraform Init
        working-directory: ${{ needs.set-context.outputs.working_dir }}
        run: terraform init -input=false -backend-config=../../backend/${{ needs.set-context.outputs.environment }}.hcl

      - name: Terraform Plan
        working-directory: ${{ needs.set-context.outputs.working_dir }}
        run: terraform plan -no-color -input=false -var-file=ci.tfvars

  apply:
    runs-on: ubuntu-latest
    needs: [detect-changes, set-context, plan]
    if: |
      (
        github.event_name == 'push' &&
        github.ref == 'refs/heads/main' &&
        needs.set-context.outputs.environment == 'dev' &&
        (
          needs.detect-changes.outputs.shared == 'true' ||
          needs.detect-changes.outputs.dev == 'true'
        )
      ) ||
      (
        github.event_name == 'workflow_dispatch' &&
        github.event.inputs.action == 'apply'
      )
    environment: ${{ needs.set-context.outputs.environment }}
    env:
      TF_VAR_trusted_cidr_blocks: ${{ secrets.TF_VAR_trusted_cidr_blocks }}
      TF_VAR_cms_public_key: ${{ secrets.TF_VAR_cms_public_key }}
      TF_VAR_jenkins_public_key: ${{ secrets.TF_VAR_cms_public_key }}
      TF_VAR_jenkins_web_ingress_cidr_blocks: ${{ secrets.TF_VAR_jenkins_web_ingress_cidr_blocks }}
      TF_VAR_enable_cluster_admin_access_entry: ${{ vars.TF_VAR_enable_cluster_admin_access_entry }}
      TF_VAR_cluster_admin_principal_arn: ${{ vars.TF_VAR_cluster_admin_principal_arn }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.set-context.outputs.environment == 'prod' && secrets.AWS_ROLE_ARN_PROD || needs.set-context.outputs.environment == 'staging' && secrets.AWS_ROLE_ARN_STAGING || secrets.AWS_ROLE_ARN_DEV }}
          aws-region: us-east-2

      - name: Terraform Init
        working-directory: ${{ needs.set-context.outputs.working_dir }}
        run: terraform init -input=false -backend-config=../../backend/${{ needs.set-context.outputs.environment }}.hcl

      - name: Terraform Apply
        working-directory: ${{ needs.set-context.outputs.working_dir }}
        run: terraform apply -auto-approve -input=false -var-file=ci.tfvars

  destroy:
    runs-on: ubuntu-latest
    needs: set-context
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    environment: ${{ needs.set-context.outputs.environment }}
    env:
      TF_VAR_trusted_cidr_blocks: ${{ secrets.TF_VAR_trusted_cidr_blocks }}
      TF_VAR_cms_public_key: ${{ secrets.TF_VAR_cms_public_key }}
      TF_VAR_jenkins_public_key: ${{ secrets.TF_VAR_cms_public_key }}
      TF_VAR_jenkins_web_ingress_cidr_blocks: ${{ secrets.TF_VAR_jenkins_web_ingress_cidr_blocks }}
      TF_VAR_enable_cluster_admin_access_entry: ${{ vars.TF_VAR_enable_cluster_admin_access_entry }}
      TF_VAR_cluster_admin_principal_arn: ${{ vars.TF_VAR_cluster_admin_principal_arn }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.set-context.outputs.environment == 'prod' && secrets.AWS_ROLE_ARN_PROD || needs.set-context.outputs.environment == 'staging' && secrets.AWS_ROLE_ARN_STAGING || secrets.AWS_ROLE_ARN_DEV }}
          aws-region: us-east-2

      - name: Terraform Init
        working-directory: ${{ needs.set-context.outputs.working_dir }}
        run: terraform init -input=false -backend-config=../../backend/${{ needs.set-context.outputs.environment }}.hcl

      - name: Terraform Destroy
        working-directory: ${{ needs.set-context.outputs.working_dir }}
        run: terraform destroy -auto-approve -input=false -var-file=ci.tfvars