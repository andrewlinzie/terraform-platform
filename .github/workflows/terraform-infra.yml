name: Terraform Infra

on:
  pull_request:
    paths:
      - 'modules/**'
      - 'environments/**'
      - '.github/workflows/**'
      - 'backend/**'
  push:
    branches:
      - main
    paths:
      - 'modules/**'
      - 'environments/**'
      - '.github/workflows/**'
      - 'backend/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      action:
        description: 'Terraform action'
        required: true
        type: choice
        options:
          - apply
          - destroy

permissions:
  id-token: write
  contents: read

jobs:
  set-context:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set.outputs.environment }}
      working_dir: ${{ steps.set.outputs.working_dir }}
    steps:
      - name: Set context
        id: set
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          else
            ENV="dev"
          fi

          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "working_dir=environments/$ENV" >> $GITHUB_OUTPUT

  fmt-validate:
    runs-on: ubuntu-latest
    needs: set-context
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.set-context.outputs.environment == 'dev' && secrets.AWS_ROLE_ARN_DEV || needs.set-context.outputs.environment == 'staging' && secrets.AWS_ROLE_ARN_STAGING || secrets.AWS_ROLE_ARN_PROD }}
          aws-region: us-east-2

      - name: Terraform Init
        working-directory: ${{ needs.set-context.outputs.working_dir }}
        run: terraform init -input=false -backend-config=../../backend/${{ needs.set-context.outputs.environment }}.hcl

      - run: terraform fmt -check -recursive

      - working-directory: ${{ needs.set-context.outputs.working_dir }}
        run: terraform validate

  plan:
    runs-on: ubuntu-latest
    needs: [set-context, fmt-validate]
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    env:
      TF_VAR_trusted_cidr_blocks: ${{ secrets.TF_VAR_trusted_cidr_blocks }}
      TF_VAR_cms_public_key: ${{ secrets.TF_VAR_cms_public_key }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.set-context.outputs.environment == 'dev' && secrets.AWS_ROLE_ARN_DEV || needs.set-context.outputs.environment == 'staging' && secrets.AWS_ROLE_ARN_STAGING || secrets.AWS_ROLE_ARN_PROD }}
          aws-region: us-east-2

      - name: Terraform Init
        working-directory: ${{ needs.set-context.outputs.working_dir }}
        run: terraform init -input=false -backend-config=../../backend/${{ needs.set-context.outputs.environment }}.hcl

      - name: Terraform Plan
        working-directory: ${{ needs.set-context.outputs.working_dir }}
        run: terraform plan -no-color -input=false -var-file=ci.tfvars

  apply:
    runs-on: ubuntu-latest
    needs: [set-context, plan]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.set-context.outputs.environment == 'dev') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    environment: ${{ needs.set-context.outputs.environment }}
    env:
      TF_VAR_trusted_cidr_blocks: ${{ secrets.TF_VAR_trusted_cidr_blocks }}
      TF_VAR_cms_public_key: ${{ secrets.TF_VAR_cms_public_key }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.set-context.outputs.environment == 'dev' && secrets.AWS_ROLE_ARN_DEV || needs.set-context.outputs.environment == 'staging' && secrets.AWS_ROLE_ARN_STAGING || secrets.AWS_ROLE_ARN_PROD }}
          aws-region: us-east-2

      - name: Terraform Init
        working-directory: ${{ needs.set-context.outputs.working_dir }}
        run: terraform init -input=false -backend-config=../../backend/${{ needs.set-context.outputs.environment }}.hcl

      - name: Terraform Apply
        working-directory: ${{ needs.set-context.outputs.working_dir }}
        run: terraform apply -auto-approve -input=false -var-file=ci.tfvars

  destroy:
    runs-on: ubuntu-latest
    needs: set-context
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    environment: ${{ needs.set-context.outputs.environment }}
    env:
      TF_VAR_trusted_cidr_blocks: ${{ secrets.TF_VAR_trusted_cidr_blocks }}
      TF_VAR_cms_public_key: ${{ secrets.TF_VAR_cms_public_key }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.set-context.outputs.environment == 'dev' && secrets.AWS_ROLE_ARN_DEV || needs.set-context.outputs.environment == 'staging' && secrets.AWS_ROLE_ARN_STAGING || secrets.AWS_ROLE_ARN_PROD }}
          aws-region: us-east-2

      - name: Terraform Init
        working-directory: ${{ needs.set-context.outputs.working_dir }}
        run: terraform init -input=false -backend-config=../../backend/${{ needs.set-context.outputs.environment }}.hcl

      - name: Terraform Destroy
        working-directory: ${{ needs.set-context.outputs.working_dir }}
        run: terraform destroy -auto-approve -input=false -var-file=ci.tfvars